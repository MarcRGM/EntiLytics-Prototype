# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - entilytics

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: index.docker.io
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_712696B134DF4F1CBE3A99B1D09A3D6F }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_8D909D5579634C5E98BC9341578513AA }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_712696B134DF4F1CBE3A99B1D09A3D6F }}/appsvc/staticsite:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DED26143AD3246B4BC3808E8E50FB7EB }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_800D221C2A8046B0A3D39E1E61E6C53B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_FF9F413B4A314FCB8C5600998F07EBAD }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'entilytics'
          slot-name: 'Production'
          images: '{{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_712696B134DF4F1CBE3A99B1D09A3D6F }}/appsvc/staticsite:${{ github.sha }}'

          
