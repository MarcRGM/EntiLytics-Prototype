# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - entilytics

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read 

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build container image locally
        uses: docker/build-push-action@v3
        with:
          context: .
          push: false 
          tags: entilytics-app:${{ github.sha }}
          file: ./Dockerfile
          outputs: type=docker,dest=/tmp/entilytics-app.tar

      - name: Upload image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: entilytics-app
          path: /tmp/entilytics-app.tar

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write 
      contents: read 

    needs: build
    
    steps:
      - name: Download image from build job
        uses: actions/download-artifact@v4
        with:
          name: entilytics-app
          path: /tmp

      - name: Load Docker image
        run: docker load <= /tmp/entilytics-app.tar

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DED26143AD3246B4BC3808E8E50FB7EB }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_800D221C2A8046B0A3D39E1E61E6C53B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_FF9F413B4A314FCB8C5600998F07EBAD }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'entilytics'
          images: 'entilytics-app:${{ github.sha }}'

          


